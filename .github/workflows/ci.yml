name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref so stale builds don't waste minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Type check ────────────────────────────────────────────────────────
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: tsc --noEmit
        run: npx tsc --noEmit

  # ── 2. Lint + format (Biome) ─────────────────────────────────────────────
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `biome check` exits non-zero if any lint or format issue is found.
      # It does NOT auto-fix — this is intentional so CI catches issues
      # that were not fixed before pushing.
      - name: biome check
        run: npx biome check .

  # ── 3. Unit tests ────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: vitest run
        run: npm test

  # ── 4. Production build ───────────────────────────────────────────────────
  # Runs only after the three gates above pass.
  # The build step is the last line of defence: it catches import errors,
  # missing exports, and invalid JSX that tsc alone can miss.
  build:
    name: Next.js build
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Stub the Supabase public env vars so the startup validation in
      # src/lib/env.ts does not throw during the build step.
      # These are NEXT_PUBLIC_ values (non-secret) — fake values are safe here.
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-build-only
